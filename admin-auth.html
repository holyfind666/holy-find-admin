<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOLY FIND - Авторизация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/admin.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="mobileMenuLabel">Меню</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="list-unstyled mb-4">
                <li><a href="admin.html" class="d-block px-3 py-3 text-decoration-none fw-semibold fs-5 rounded sidebar-mobile-link">Главная</a></li>
                <li><a href="admin-comments.html" class="d-block px-3 py-3 text-decoration-none fw-semibold fs-5 rounded sidebar-mobile-link">Комментарии</a></li>
                <li><a href="admin-users.html" class="d-block px-3 py-3 text-decoration-none fw-semibold fs-5 rounded sidebar-mobile-link">Пользователи</a></li>
                <li><a href="admin-collections.html" class="d-block px-3 py-3 text-decoration-none fw-semibold fs-5 rounded sidebar-mobile-link">Коллекции</a></li>
            </ul>
            <hr />
            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-3 theme-toggle-offcanvas" type="button">
                <img src="img/sun.png" alt="Тема" class="theme-icon-offcanvas" style="width: 24px; height: 24px;" />
                <span class="theme-text-offcanvas">Светлая тема</span>
            </button>
        </div>
    </div>

    <header class="navbar navbar-expand-lg sticky-top shadow-sm py-0 header-theme">
        <div class="container-fluid px-0">
            <div class="d-flex align-items-center justify-content-between w-100 px-4 px-md-5" style="height: 80px;">
                <button class="btn btn-link text-body p-0 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                    <img src="img/burger.png" alt="Меню" style="width: 32px; height: 32px;" />
                </button>
                <a href="admin.html" class="logo mx-auto mx-lg-0">
                    <div class="logo-h"><img src="img/logo.png" alt="H" /></div>
                    <p class="logo-text d-none d-lg-block">oly find</p>
                </a>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-secondary d-none d-lg-flex align-items-center justify-content-center p-2 rounded-circle theme-toggle-desktop" type="button" style="width: 44px; height: 44px;">
                        <img src="img/sun.png" alt="Тема" class="theme-icon-desktop" style="width: 22px; height: 22px;" />
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="main-bg" style="min-height: calc(100vh - 80px);">
        <div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4 py-5">
                <div class="card border-0 shadow-sm rounded-4 card-theme">
                    <div class="card-header bg-transparent border-0 pt-5 pb-3 px-5 text-center">
                        <h5 class="fw-bold mb-0 fs-3">Авторизация</h5>
                    </div>
                    <div class="card-body px-5 pb-5">
                        <form onsubmit="handleLogin(event)">
                            <div class="mb-4">
                                <label for="login" class="form-label fw-semibold fs-5">Логин</label>
                                <input type="text" class="form-control form-control-lg rounded-3 fs-5 py-3" id="login" placeholder="Введите логин" />
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold fs-5">Пароль</label>
                                <input type="password" class="form-control form-control-lg rounded-3 fs-5 py-3" id="password" placeholder="Введите пароль" />
                            </div>
                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-dark rounded-3 py-3 fs-5">Войти</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-100 border-top footer-theme">
        <div class="d-flex flex-column align-items-center justify-content-center py-4 gap-3 px-4 px-md-5">
            <p class="mb-0 footer-text">© 2025 HOLY FIND. Все права защищены.</p>
            <hr class="border-0 my-0 footer-line" style="width: 100%; max-width: 400px; height: 1px;" />
            <a href="mailto:supportholyfind.mail.ru" class="text-body text-decoration-none opacity-50 footer-text">supportholyfind.mail.ru</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
