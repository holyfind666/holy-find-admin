<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOLY FIND - Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/admin.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/theme.js"></script>
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top shadow-sm py-0 header-theme">
        <div class="container-fluid px-0">
            <div class="d-flex align-items-center justify-content-between w-100 px-4 px-md-5" style="height: 80px;">
                <a href="admin.html" class="logo">
                    <div class="logo-h"><img src="img/logo.png" alt="H" /></div>
                    <p class="logo-text d-none d-lg-block">oly find</p>
                </a>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center p-2 rounded-circle theme-toggle-desktop" type="button" style="width: 44px; height: 44px;">
                        <img src="img/sun.png" alt="Тема" class="theme-icon-desktop" style="width: 22px; height: 22px;" />
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="main-bg" style="min-height: calc(100vh - 80px);">
        <div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
            <div class="col-12 col-md-6 col-lg-4 py-5 px-4">
                <div class="card border-0 shadow-sm rounded-4 card-theme">
                    <div class="card-body p-5 text-center">
                        <img src="img/icon.png" alt="Профиль" class="rounded-circle border border-light mb-4" style="width: 100px; height: 100px; object-fit: cover;" />
                        <h4 class="fw-bold mb-2">Администратор</h4>
                        <p class="text-muted mb-4">admin@holyfind.ru</p>
                        <hr class="mb-4" />
                        <div class="d-grid gap-3">
                            <a href="admin.html" class="btn btn-dark rounded-3 py-3 fs-5">Вернуться на главную</a>
                            <a href="admin-auth.html" class="btn btn-outline-danger rounded-3 py-3 fs-5">Выйти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="w-100 border-top footer-theme">
        <div class="d-flex flex-column align-items-center justify-content-center py-4 gap-3 px-4 px-md-5">
            <p class="mb-0 footer-text">© 2025 HOLY FIND. Все права защищены.</p>
            <hr class="border-0 my-0 footer-line" style="width: 100%; max-width: 400px; height: 1px;" />
            <a href="mailto:supportholyfind.mail.ru" class="text-body text-decoration-none opacity-50 footer-text">supportholyfind.mail.ru</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
